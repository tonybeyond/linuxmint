; =============================================================================
; Polybar — réplique de la barre qtile DTOS (tonybeyond/fedoraqtile)
; Powerline arrows  | Palette Doom One | Mononoki Nerd Font
; Modules : launcher · workspaces · titre | CPU · RAM · Net · Vol · Horloge · Tray
; =============================================================================

[colors]
bg      = #282c34
bg-alt  = #1c1f24
fg      = #bbc2cf
grey    = #5b6268
red     = #ff6c6b
green   = #98be65
yellow  = #ecbe7b
blue    = #51afef
magenta = #c678dd
cyan    = #46d9ff
orange  = #da8548

[bar/main]
; une barre par écran — launch.sh exporte MONITOR (fix multi-écran)
monitor = ${env:MONITOR:}
width = 100%
height = 26
; gaps autour de la barre (équiv. margin=[6,8,0,8] qtile) via offset + tray
offset-x = 0
offset-y = 0
background = ${colors.bg}
foreground = ${colors.fg}
padding-left = 1
padding-right = 1
module-margin = 0

font-0 = "Mononoki Nerd Font:style=Bold:size=11;3"
font-1 = "Mononoki Nerd Font:size=14;3"
; font-2 : flèches powerline pleine hauteur
font-2 = "Mononoki Nerd Font:size=19;5"

modules-left = launcher i3 sep layout-indicator sep xwindow
modules-right = arr1 cpu arr2 memory arr1 network network-wifi arr2 pulseaudio arr1 date arr2 tray

wm-restack = i3
enable-ipc = true
cursor-click = pointer

; ── Gauche ────────────────────────────────────────────────────────────────────
[module/launcher]
type = custom/text
format = " "
format-font = 2
format-foreground = ${colors.blue}
format-padding = 1
click-left = rofi -show drun

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = false
index-sort = true
enable-scroll = true

; icônes identiques aux group_labels qtile
ws-icon-0 = 1;
ws-icon-1 = 2;
ws-icon-2 = 3;
ws-icon-3 = 4;
ws-icon-4 = 5;
ws-icon-5 = 6;
ws-icon-6 = 7;
ws-icon-7 = 8;
ws-icon-8 = 9;

format = <label-state>
label-focused = %icon%
label-focused-foreground = ${colors.fg}
label-focused-underline = ${colors.blue}
label-focused-background = ${colors.bg-alt}
label-focused-padding = 1
label-unfocused = %icon%
label-unfocused-foreground = ${colors.grey}
label-unfocused-padding = 1
label-visible = %icon%
label-visible-foreground = ${colors.fg}
label-visible-padding = 1
label-urgent = %icon%
label-urgent-foreground = ${colors.red}
label-urgent-padding = 1

[module/sep]
type = custom/text
format = "|"
format-foreground = ${colors.grey}

[module/layout-indicator]
type = custom/script
; layout du conteneur parent de la fenêtre focus (équiv. CurrentLayout qtile)
exec = ~/.config/polybar/i3-layout.py
interval = 2
format-foreground = ${colors.magenta}

[module/xwindow]
type = internal/xwindow
label = %title:0:50:…%
label-foreground = ${colors.cyan}
label-padding = 1

; ── Flèches powerline (signature DTOS —  alterné bg/bg-alt) ──────────────────
[module/arr1]
type = custom/text
format = "%{T3}%{T-}"
format-foreground = ${colors.bg-alt}
format-background = ${colors.bg}

[module/arr2]
type = custom/text
format = "%{T3}%{T-}"
format-foreground = ${colors.bg}
format-background = ${colors.bg-alt}

; ── Droite (mêmes widgets/couleurs/formats que qtile) ─────────────────────────
[module/cpu]
type = internal/cpu
interval = 3
format = <label>
format-background = ${colors.bg-alt}
label = " %percentage%%"
label-foreground = ${colors.blue}
label-padding = 1

[module/memory]
type = internal/memory
interval = 5
format = <label>
format-background = ${colors.bg}
label = " %gb_used%"
label-foreground = ${colors.green}
label-padding = 1

[module/network]
type = internal/network
; polybar ne bascule PAS wired→wireless : deux modules, l'inactif se masque
interface-type = wired
interval = 3
format-connected = <label-connected>
format-connected-background = ${colors.bg-alt}
label-connected = " %downspeed%"
label-connected-foreground = ${colors.yellow}
label-connected-padding = 1
format-disconnected = <label-disconnected>
format-disconnected-background = ${colors.bg-alt}
label-disconnected = ""

[module/network-wifi]
type = internal/network
interface-type = wireless
interval = 3
format-connected = <label-connected>
format-connected-background = ${colors.bg-alt}
label-connected = " %downspeed%"
label-connected-foreground = ${colors.yellow}
label-connected-padding = 1
format-disconnected = <label-disconnected>
label-disconnected = ""

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
format-volume-background = ${colors.bg}
label-volume = " %percentage%%"
label-volume-foreground = ${colors.orange}
label-volume-padding = 1
format-muted-background = ${colors.bg}
label-muted = " muet"
label-muted-foreground = ${colors.grey}
label-muted-padding = 1
click-right = pavucontrol

[module/date]
type = internal/date
interval = 30
date = " %H:%M  %a %d.%m"
format-background = ${colors.bg-alt}
label = %date%
label-foreground = ${colors.magenta}
label-padding = 1

[module/tray]
type = internal/tray
format-margin = 4
tray-spacing = 6
tray-size = 16
tray-background = ${colors.bg}

[settings]
screenchange-reload = true
pseudo-transparency = false
